name: Deploy Spring Backend

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-spring.yml"

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO_SPRING: cosy/spring

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Spring image
        run: |
          ECR_REGISTRY=${{ steps.ecr.outputs.registry }}
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPO_SPRING }}:latest ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_REPO_SPRING }}:latest

      - name: Deploy Spring on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /opt/cosy
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}
            docker compose pull spring
            docker compose up -d spring
            docker image prune -f
